<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g fill="none" stroke="black" stroke-linecap="round" stroke-linejoin="round">
    <!-- 8 petals rotated around center (50,50) -->
    <ellipse cx="50" cy="34" rx="5" ry="14" stroke-width="2" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="34" rx="5" ry="14" stroke-width="2" transform="rotate(45 50 50)"/>
    <ellipse cx="50" cy="34" rx="5" ry="14" stroke-width="2" transform="rotate(90 50 50)"/>
    <ellipse cx="50" cy="34" rx="5" ry="14" stroke-width="2" transform="rotate(135 50 50)"/>
    <ellipse cx="50" cy="34" rx="5" ry="14" stroke-width="2" transform="rotate(180 50 50)"/>
    <ellipse cx="50" cy="34" rx="5" ry="14" stroke-width="2" transform="rotate(225 50 50)"/>
    <ellipse cx="50" cy="34" rx="5" ry="14" stroke-width="2" transform="rotate(270 50 50)"/>
    <ellipse cx="50" cy="34" rx="5" ry="14" stroke-width="2" transform="rotate(315 50 50)"/>
    <!-- Center -->
    <circle cx="50" cy="50" r="9" stroke-width="2.5"/>
    <!-- Stem -->
    <line x1="50" y1="59" x2="50" y2="91" stroke-width="2.5"/>
    <!-- Left leaf -->
    <path d="M50,74 Q38,68 36,76 Q40,84 50,80" stroke-width="2"/>
    <!-- Right leaf -->
    <path d="M50,74 Q62,68 64,76 Q60,84 50,80" stroke-width="2"/>
  </g>
</svg>
